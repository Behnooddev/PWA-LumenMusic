<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<!--
  Lumen — Music Player PWA Template
  Created by Behnood Shafiei — https://github.com/Behnooddev
-->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Lumen — Music Player</title>
<meta name="description" content="An open-source, offline-first music player PWA template. Import your own songs — no bundled music, ever." />
<meta name="author" content="Behnood Shafiei" />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0a0a0c" />

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lumen" />
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
<link rel="icon" href="assets/icons/icon-192.png" />

<link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<!-- ===================== TOP BAR ===================== -->
<header class="topbar">
  <button class="icon-btn" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="sideMenu">
    <span class="burger"><i></i><i></i><i></i></span>
  </button>
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">◐</span>
    <span class="brand-name">Lumen</span>
  </div>
  <div class="topbar-spacer" aria-hidden="true"></div>
</header>

<!-- ===================== SLIDE-OUT MENU ===================== -->
<nav class="side-menu" id="sideMenu" aria-hidden="true" aria-label="Main navigation">
  <div class="side-menu-header">
    <span class="brand-mark large" aria-hidden="true">◐</span>
    <div>
      <div class="side-app-name">Lumen</div>
      <div class="side-app-tag" data-i18n="app.tagline">your glow, your sound</div>
    </div>
  </div>
  <ul class="menu-list" role="list">
    <li><button class="menu-item active" data-page="home"><span class="menu-ico" aria-hidden="true">⌂</span><span data-i18n="nav.home">Home</span></button></li>
    <li><button class="menu-item" data-page="library"><span class="menu-ico" aria-hidden="true">♫</span><span data-i18n="nav.library">Library</span></button></li>
    <li><button class="menu-item" data-page="playlists"><span class="menu-ico" aria-hidden="true">☰</span><span data-i18n="nav.playlists">Playlists</span></button></li>
    <li><button class="menu-item" data-page="favorites"><span class="menu-ico" aria-hidden="true">♥</span><span data-i18n="nav.favorites">Favorites</span></button></li>
    <li><button class="menu-item" data-page="phoneMusic"><span class="menu-ico" aria-hidden="true">📱</span><span data-i18n="nav.phoneMusic">Phone Music</span></button></li>
    <li><button class="menu-item" data-page="settings"><span class="menu-ico" aria-hidden="true">⚙</span><span data-i18n="nav.settings">Settings</span></button></li>
    <li><button class="menu-item" data-page="about"><span class="menu-ico" aria-hidden="true">ℹ</span><span data-i18n="nav.about">About</span></button></li>
  </ul>
  <div class="side-menu-footer">v2.0.0 · offline · no bundled music</div>
</nav>
<div class="scrim" id="scrim"></div>

<!-- ===================== MAIN ===================== -->
<main id="main">
  <section class="page-container active" id="page-home" data-page="home"></section>
  <section class="page-container" id="page-library" data-page="library"></section>
  <section class="page-container" id="page-playlists" data-page="playlists"></section>
  <section class="page-container" id="page-favorites" data-page="favorites"></section>
  <section class="page-container" id="page-phoneMusic" data-page="phoneMusic"></section>
  <section class="page-container" id="page-settings" data-page="settings"></section>
  <section class="page-container" id="page-about" data-page="about"></section>
</main>

<!-- ===================== MINI PLAYER ===================== -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-progress-track" id="miniProgressTrack" role="slider" tabindex="0" aria-label="Seek" aria-valuemin="0" aria-valuemax="100">
    <div class="mini-progress-fill" id="miniProgressFill">
      <span class="mini-progress-knob" id="miniProgressKnob" aria-hidden="true"></span>
    </div>
  </div>
  <div class="mini-time-row">
    <span class="mini-time" id="miniCurrentTime">0:00</span>
    <span class="mini-time" id="miniRemainingTime">-0:00</span>
  </div>
  <div class="mini-inner">
    <div class="mini-left" id="miniOpenLyrics" role="button" tabindex="0" aria-label="Open lyrics">
      <img class="mini-cover" id="miniCover" src="assets/icons/icon-192.png" alt="" />
      <div class="mini-text">
        <div class="mini-title" id="miniTitle" data-i18n="player.nothingPlaying">Nothing playing</div>
        <div class="mini-artist" id="miniArtist" data-i18n="player.pickASong">Pick a song to start</div>
      </div>
    </div>

    <canvas id="waveform" class="waveform" width="130" height="30" aria-hidden="true"></canvas>

    <div class="mini-controls">
      <button class="mini-btn" id="shuffleBtn" aria-label="Shuffle off" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M4 6h3.5l7 12H18M4 18h3.5l2-3.4M14.5 6H18M18 6l-2.5-2.5M18 6l-2.5 2.5M18 18l-2.5-2.5M18 18l-2.5 2.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="mini-btn" id="prevBtn" aria-label="Previous track">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6 6v12M18 6l-9 6 9 6V6z" fill="currentColor"/></svg>
      </button>
      <button class="mini-btn play" id="playBtn" aria-label="Play">
        <svg viewBox="0 0 24 24" width="20" height="20" id="playIcon" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
      </button>
      <button class="mini-btn" id="nextBtn" aria-label="Next track">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M18 6v12M6 6l9 6-9 6V6z" fill="currentColor"/></svg>
      </button>
      <button class="mini-btn" id="miniFavBtn" aria-label="Add to favorites" aria-pressed="false">♡</button>
    </div>
  </div>
</div>

<!-- ===================== LYRICS MODAL ===================== -->
<div class="lyrics-modal" id="lyricsModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="lyricsTitle">
  <div class="lyrics-backdrop" id="lyricsBackdrop"></div>
  <div class="lyrics-sheet glass">
    <div class="lyrics-art-bg" id="lyricsArtBg" aria-hidden="true"></div>
    <div class="lyrics-content">
      <div class="lyrics-head">
        <img id="lyricsCover" class="lyrics-cover" src="assets/icons/icon-192.png" alt="" />
        <div>
          <div class="lyrics-title" id="lyricsTitle">Song title</div>
          <div class="lyrics-artist" id="lyricsArtist">Artist</div>
        </div>
        <button class="icon-btn" id="lyricsClose" aria-label="Close lyrics">✕</button>
      </div>
      <div class="lyrics-lang-toggle">
        <button class="seg active" data-lang="en">EN</button>
        <button class="seg" data-lang="fa">فا</button>
      </div>
      <div class="lyrics-body" id="lyricsBody"></div>
      <div class="lyrics-floating-controls" id="lyricsFloatingControls">
        <button class="mini-btn" id="lyricsPrevBtn" aria-label="Previous track">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6 6v12M18 6l-9 6 9 6V6z" fill="currentColor"/></svg>
        </button>
        <button class="mini-btn play" id="lyricsPlayBtn" aria-label="Play">
          <svg viewBox="0 0 24 24" width="20" height="20" id="lyricsPlayIcon" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
        </button>
        <button class="mini-btn" id="lyricsNextBtn" aria-label="Next track">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M18 6v12M6 6l9 6-9 6V6z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===================== IMPORT (hidden native input + drag overlay live in JS) ===================== -->
<!--
  accept intentionally combines the audio/* MIME wildcard with explicit
  extensions. iOS Safari's file picker matches accept against a file's
  UTI (Uniform Type Identifier), and for files from iCloud Drive or
  certain "On My iPhone" locations that UTI match against a bare
  "audio/*" is inconsistent — matching files appear enabled while
  others (often m4a/aac from iCloud) appear greyed out even though
  they're valid audio. Listing extensions alongside the MIME wildcard
  is the documented workaround and does not reduce what Android/desktop
  browsers show, since they match on MIME type first regardless.
-->
<input type="file" id="globalFileInput" accept="audio/*,.mp3,.m4a,.wav,.aac,.flac,.ogg,.aif,.aiff,.caf" multiple hidden />

<script type="module" src="src/main.js"></script>
</body>
</html>
